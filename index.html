<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Untuk Alexa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Reset & Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505; /* Dark background for desktop overflow */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Mobile Exclusive Wrapper */
        .mobile-wrapper {
            position: relative;
            width: 100%;
            max-width: 430px; /* iPhone 14 Pro Max width */
            height: 100dvh;
            max-height: 932px;
            background: radial-gradient(circle at top right, #2b1031, #0a0612);
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 42, 117, 0.15);
        }

        /* Particle Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphism Card for Content */
        .glass-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            padding: 40px 25px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            z-index: 5;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.5s ease;
        }

        .text-content {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 300;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
        }

        .text-content.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Final Question Phase */
        .action-area {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 30px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .action-area.active {
            display: flex;
            opacity: 1;
        }

        .btn {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 200px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff2a75, #ff7eb3);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 42, 117, 0.4);
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
        }

        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: absolute;
            bottom: -60px; /* Hidden initially, moved by JS */
            z-index: 10;
        }

        /* Tap indicator */
        .tap-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 2;
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { opacity: 0.2; transform: translate(-50%, 0px); }
            50% { opacity: 0.7; transform: translate(-50%, -5px); }
            100% { opacity: 0.2; transform: translate(-50%, 0px); }
        }

        /* Touch target overlay for tapping to next text */
        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
        }
    </style>
</head>
<body>

    <div class="mobile-wrapper" id="appWrapper">
        <canvas id="particlesCanvas"></canvas>
        
        <div class="touch-overlay" id="touchArea"></div>

        <div class="glass-card" id="mainCard">
            <div id="textDisplay" class="text-content active">Halo, Alexa...</div>
            
            <div id="actionArea" class="action-area">
                <div class="text-content active" style="font-weight: 500; margin-bottom: 25px;">Apakah kamu mau memaafkanku?</div>
                <button class="btn btn-yes" id="btnYes">Iya, Aku Maafkan</button>
                <button class="btn btn-no" id="btnNo">Nggak Mau</button>
            </div>
        </div>

        <div id="tapIndicator" class="tap-indicator">TAP LAYAR UNTUK LANJUT</div>
    </div>

    <script>
        // --- 1. DATA TEXT PERBUCINAN ---
        const storyLines = [
            "Halo, Alexa...",
            "Mungkin caraku ini sedikit berlebihan, tapi ini usahaku.",
            "Aku sadar, selama ini aku adalah cowok yang sering gagal membaca perasaanmu.",
            "Seringkali logikaku tak sejalan dengan apa yang hatimu butuhkan.",
            "Maafkan egoku... maafkan ketidakpekaanku.",
            "Kehilangan tawamu adalah bagian terberat buatku.",
            "Aku membuat ini khusus untukmu...",
            "Sebagai tanda bahwa aku benar-benar ingin memperbaiki semuanya dan memahamimu.",
            "" // String kosong memicu pertanyaan terakhir
        ];

        let currentStep = 0;
        
        // --- 2. DOM ELEMENTS ---
        const textDisplay = document.getElementById('textDisplay');
        const touchArea = document.getElementById('touchArea');
        const tapIndicator = document.getElementById('tapIndicator');
        const actionArea = document.getElementById('actionArea');
        const mainCard = document.getElementById('mainCard');
        const btnNo = document.getElementById('btnNo');
        const btnYes = document.getElementById('btnYes');
        const wrapper = document.getElementById('appWrapper');

        // --- 3. TEXT PROGRESSION LOGIC ---
        touchArea.addEventListener('click', () => {
            if (currentStep >= storyLines.length - 1) return;

            currentStep++;
            textDisplay.classList.remove('active');
            
            // Haptic feedback kecil jika didukung browser HP
            if (navigator.vibrate) navigator.vibrate(30);
            
            setTimeout(() => {
                if (storyLines[currentStep] === "") {
                    textDisplay.style.display = 'none';
                    tapIndicator.style.display = 'none';
                    touchArea.style.display = 'none'; // Matikan area sentuh agar tombol bisa ditekan
                    actionArea.classList.add('active');
                    mainCard.style.padding = "40px 15px 120px 15px"; // Beri ruang untuk tombol lari
                    initNoButtonLogic();
                } else {
                    textDisplay.textContent = storyLines[currentStep];
                    textDisplay.classList.add('active');
                }
            }, 500); // Waktu transisi fade out
        });

        // --- 4. RUNAWAY BUTTON LOGIC ---
        function initNoButtonLogic() {
            // Tempatkan tombol "No" tepat di bawah tombol "Yes" pada awalnya
            btnNo.style.bottom = "20px";
            btnNo.style.left = "50%";
            btnNo.style.transform = "translateX(-50%)";

            const dodgeCursor = (e) => {
                e.preventDefault();
                
                // Ambil batas maksimal area mobile-wrapper
                const wrapperRect = wrapper.getBoundingClientRect();
                const btnWidth = btnNo.offsetWidth;
                const btnHeight = btnNo.offsetHeight;
                
                // Kalkulasi posisi random yang aman agar tombol tidak keluar dari layar HP
                const maxX = wrapperRect.width - btnWidth - 20;
                const maxY = wrapperRect.height - btnHeight - 20;

                const randomX = Math.max(10, Math.floor(Math.random() * maxX));
                const randomY = Math.max(10, Math.floor(Math.random() * maxY));

                // Ubah posisi menjadi absolute terhadap wrapper
                btnNo.style.position = 'absolute';
                btnNo.style.left = `${randomX}px`;
                btnNo.style.top = `${randomY}px`;
                btnNo.style.bottom = "auto";
                btnNo.style.transform = "none";
                btnNo.style.transition = "all 0.15s ease-out";
            };

            // Tangkap event sentuh (HP) dan kursor (PC)
            btnNo.addEventListener('touchstart', dodgeCursor, {passive: false});
            btnNo.addEventListener('mouseover', dodgeCursor);
        }

        // --- 5. YES BUTTON SUCCESS EVENT ---
        btnYes.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]); // Vibrate sukses
            
            actionArea.innerHTML = `
                <div class="text-content active" style="font-size: 1.5rem; color: #ff7eb3; font-weight:600;">
                    Terima kasih, Alexa ❤️
                </div>
                <div class="text-content active" style="font-size: 0.9rem; margin-top:10px; color:#e0e0e0;">
                    Aku janji akan lebih peka dan mengerti kamu.
                </div>
            `;
            mainCard.style.padding = "50px 25px";
            triggerFireworks();
        });

        // --- 6. ADVANCED PARTICLE ENGINE (Beautiful Floating Dust & Stars) ---
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = wrapper.offsetWidth;
            canvas.height = wrapper.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];
        const colors = ['#ff7eb3', '#ff2a75', '#ffffff', '#8c52ff'];

        class Particle {
            constructor(isFirework = false, x, y) {
                this.isFirework = isFirework;
                this.x = x !== undefined ? x : Math.random() * canvas.width;
                this.y = y !== undefined ? y : Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                if (isFirework) {
                    this.speedX = (Math.random() - 0.5) * (Math.random() * 12);
                    this.speedY = (Math.random() - 0.5) * (Math.random() * 12);
                    this.life = 1;
                    this.decay = Math.random() * 0.02 + 0.01;
                } else {
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 1.5 - 0.5; // Mengalir perlahan ke atas
                    this.alpha = Math.random() * 0.5 + 0.1;
                }
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.isFirework) {
                    this.speedY += 0.1; // Gravity effect for fireworks
                    this.life -= this.decay;
                } else {
                    // Reset partikel jika keluar dari layar atas
                    if (this.y < -10) {
                        this.y = canvas.height + 10;
                        this.x = Math.random() * canvas.width;
                    }
                    if (this.x < -10 || this.x > canvas.width + 10) {
                        this.speedX *= -1;
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.isFirework ? Math.max(0, this.life) : this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // Inisialisasi partikel statis
        for (let i = 0; i < 70; i++) {
            particles.push(new Particle());
        }

        function triggerFireworks() {
            // Hapus partikel ambien, ganti dengan ledakan
            particles = []; 
            for(let i=0; i<3; i++) {
                setTimeout(() => {
                    const originX = canvas.width/2 + (Math.random()-0.5)*100;
                    const originY = canvas.height/2 + (Math.random()-0.5)*100;
                    for (let j = 0; j < 60; j++) {
                        particles.push(new Particle(true, originX, originY));
                    }
                }, i * 400); // 3 kali ledakan berurutan
            }
        }

        function animate() {
            // Efek ekor panjang (trail) dengan membersihkan canvas menggunakan fill rgba
            ctx.fillStyle = 'rgba(10, 6, 18, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                
                // Hapus partikel kembang api yang sudah mati
                if (p.isFirework && p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
