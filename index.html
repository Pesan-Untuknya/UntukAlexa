<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Untuk Alexa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Reset & Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #030105; /* Background sangat gelap untuk PC */
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Mobile Wrapper - Responsif 100% di HP */
        .mobile-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height untuk browser HP (Chrome/Safari) */
            max-width: 480px; /* Hanya membatasi lebar jika dibuka di layar besar (PC/Tablet) */
            background: linear-gradient(135deg, #16041a 0%, #08020a 100%);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 42, 117, 0.1);
        }

        /* Particle Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Glowing Background Orbs yang Bergerak Halus */
        .glow-orb {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255,42,117,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 1;
            animation: floatGlow 10s infinite alternate ease-in-out;
        }
        .orb-1 { top: -80px; left: -80px; }
        .orb-2 { bottom: -80px; right: -80px; animation-delay: -5s; background: radial-gradient(circle, rgba(140,82,255,0.15) 0%, rgba(0,0,0,0) 70%); }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.3); }
        }

        /* Glassmorphism Card for Content */
        .glass-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            padding: 40px 25px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            z-index: 5;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.03);
            transition: all 0.5s ease;
        }

        .text-content {
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 300;
            line-height: 1.7;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
        }

        .text-content.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Final Question Phase */
        .action-area {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .action-area.active {
            display: flex;
            opacity: 1;
        }

        .btn {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            padding: 14px 30px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s, background 0.3s;
            width: 100%;
            max-width: 220px;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff2a75, #ff7eb3);
            color: white;
            box-shadow: 0 5px 25px rgba(255, 42, 117, 0.4);
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
        }

        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            position: absolute;
            bottom: -60px;
            z-index: 10;
        }

        /* Tap indicator */
        .tap-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            letter-spacing: 2px;
            z-index: 2;
            text-align: center;
            width: 100%;
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        .volume-hint {
            display: block;
            font-size: 0.65rem;
            margin-top: 5px;
            opacity: 0.7;
            color: #ff7eb3;
        }

        @keyframes pulse {
            0% { opacity: 0.2; transform: translate(-50%, 0px); }
            50% { opacity: 0.9; transform: translate(-50%, -5px); }
            100% { opacity: 0.2; transform: translate(-50%, 0px); }
        }

        /* Touch target overlay */
        .touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="lagu_galau.mp3.mp4">
    </audio>

    <div class="mobile-wrapper" id="appWrapper">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        
        <canvas id="particlesCanvas"></canvas>
        <div class="touch-overlay" id="touchArea"></div>

        <div class="glass-card" id="mainCard">
            <div id="textDisplay" class="text-content active">Halo, Alexa...</div>
            
            <div id="actionArea" class="action-area">
                <div class="text-content active" style="font-weight: 500; margin-bottom: 25px; font-size: 1.25rem;">
                    Jadi... dari lubuk hatiku,<br>Apakah kamu mau memaafkanku?
                </div>
                <button class="btn btn-yes" id="btnYes">Iya, Aku Maafkan</button>
                <button class="btn btn-no" id="btnNo">Nggak Mau</button>
            </div>
        </div>

        <div id="tapIndicator" class="tap-indicator">
            TAP LAYAR UNTUK MULAI
            <span class="volume-hint" id="volHint">(Pastikan volume HP menyala)</span>
        </div>
    </div>

    <script>
        // --- 1. DATA TEXT STORYLINE (TENTANG GAME & VOICE CALL) ---
        const storyLines = [
            "Halo, Alexa...",
            "Maaf ya, belakangan ini aku sadar banget kalau aku sering bikin kamu ngerasa sendirian.",
            "Aku terlalu asyik dengan duniaku sendiri. Terlalu sering sibuk main game sampai lupa waktu.",
            "Aku lupa ngajak kamu main bareng, dan bahkan jarang banget ngeluangin waktu buat sekadar ngobrol atau dengerin suara kamu...",
            "Padahal, jujur aja... mendengar suara kamu dan ngobrol sama kamu itu jauh lebih berharga dari game apa pun yang aku mainin.",
            "Maaf kalau keegoisanku bikin kamu ngerasa nggak diprioritaskan. Itu beneran salahku.",
            "Aku benar-benar nyesel, dan aku kangen banget ketawa bareng kamu.",
            "Aku janji bakal lebih merhatiin kamu, ngajak kamu main bareng, dan banyakin waktu ngobrol buat kita.",
            "" // String kosong memicu halaman pertanyaan
        ];

        let currentStep = 0;
        let isMusicPlaying = false;
        
        // --- 2. DOM ELEMENTS ---
        const textDisplay = document.getElementById('textDisplay');
        const touchArea = document.getElementById('touchArea');
        const tapIndicator = document.getElementById('tapIndicator');
        const volHint = document.getElementById('volHint');
        const actionArea = document.getElementById('actionArea');
        const mainCard = document.getElementById('mainCard');
        const btnNo = document.getElementById('btnNo');
        const btnYes = document.getElementById('btnYes');
        const wrapper = document.getElementById('appWrapper');
        const bgMusic = document.getElementById('bgMusic');

        // --- 3. TEXT & AUDIO PROGRESSION LOGIC ---
        touchArea.addEventListener('click', () => {
            // Mainkan musik pada tap pertama
            if (!isMusicPlaying) {
                bgMusic.play().catch(e => console.log("Menunggu interaksi pengguna untuk audio"));
                isMusicPlaying = true;
                volHint.style.display = 'none'; 
                tapIndicator.innerHTML = "TAP LAYAR UNTUK LANJUT"; 
            }

            if (currentStep >= storyLines.length - 1) return;

            currentStep++;
            textDisplay.classList.remove('active');
            
            if (navigator.vibrate) navigator.vibrate(20); 
            
            setTimeout(() => {
                if (storyLines[currentStep] === "") {
                    textDisplay.style.display = 'none';
                    tapIndicator.style.display = 'none';
                    touchArea.style.display = 'none'; 
                    actionArea.classList.add('active');
                    mainCard.style.padding = "40px 15px 120px 15px"; 
                    initNoButtonLogic();
                } else {
                    textDisplay.textContent = storyLines[currentStep];
                    textDisplay.classList.add('active');
                }
            }, 600); 
        });

        // --- 4. RUNAWAY BUTTON LOGIC ---
        function initNoButtonLogic() {
            btnNo.style.bottom = "20px";
            btnNo.style.left = "50%";
            btnNo.style.transform = "translateX(-50%)";

            const dodgeCursor = (e) => {
                e.preventDefault();
                const wrapperRect = wrapper.getBoundingClientRect();
                const btnWidth = btnNo.offsetWidth;
                const btnHeight = btnNo.offsetHeight;
                
                const maxX = wrapperRect.width - btnWidth - 20;
                const maxY = wrapperRect.height - btnHeight - 20;

                const randomX = Math.max(10, Math.floor(Math.random() * maxX));
                const randomY = Math.max(10, Math.floor(Math.random() * maxY));

                btnNo.style.position = 'absolute';
                btnNo.style.left = `${randomX}px`;
                btnNo.style.top = `${randomY}px`;
                btnNo.style.bottom = "auto";
                btnNo.style.transform = "none";
                btnNo.style.transition = "all 0.2s cubic-bezier(0.25, 1, 0.5, 1)";
            };

            btnNo.addEventListener('touchstart', dodgeCursor, {passive: false});
            btnNo.addEventListener('mouseover', dodgeCursor);
        }

        // --- 5. YES BUTTON SUCCESS & WHATSAPP REDIRECT ---
        btnYes.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate([50, 100, 50]); 
            
            const noWA = "6282238398411";
            // Pesan disesuaikan dengan konteks gaming/suara
            const pesan = "Hai... aku udah baca semuanya. Iya, aku maafin. Awas aja kalau asyik nge-game sendiri lagi dan lupa ngajak ngobrol! :)";
            const whatsappURL = `https://wa.me/${noWA}?text=${encodeURIComponent(pesan)}`;

            actionArea.innerHTML = `
                <div class="text-content active" style="font-size: 1.8rem; color: #ff7eb3; font-weight:600; text-shadow: 0 0 20px rgba(255,126,179,0.8);">
                    Makasih ya, Alexa :)
                </div>
                <div class="text-content active" style="font-size: 0.9rem; margin-top:10px; color:#e0e0e0;">
                    Aku janji nggak akan main sendiri terus.
                </div>
                <a href="${whatsappURL}" class="btn btn-yes" style="margin-top: 30px; padding: 12px 20px; font-size: 0.9rem;">
                    Lanjut ke WhatsApp
                </a>
                <div class="text-content active" style="font-size: 0.7rem; margin-top:10px; color:#888;">
                    (Jika tidak dialihkan otomatis, klik tombol di atas)
                </div>
            `;
            mainCard.style.padding = "50px 25px";
            triggerFireworks();

            setTimeout(() => {
                window.location.href = whatsappURL;
            }, 3000); 
        });

        // --- 6. ADVANCED PARTICLE ENGINE (Stars, Hearts, & Shooting Stars) ---
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = wrapper.offsetWidth;
            canvas.height = wrapper.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];
        let shootingStars = [];

        // Class untuk Bintang Biasa dan Hati
        class Particle {
            constructor(isFirework = false, x, y) {
                this.isFirework = isFirework;
                this.x = x !== undefined ? x : Math.random() * canvas.width;
                this.y = y !== undefined ? y : Math.random() * canvas.height;
                this.type = Math.random() > 0.85 ? 'heart' : 'star'; // 15% partikel berbentuk hati
                
                if (this.type === 'heart') {
                    this.size = Math.random() * 0.8 + 0.4;
                    this.color = '#ff2a75';
                } else {
                    this.size = Math.random() * 1.5 + 0.5;
                    this.color = Math.random() > 0.5 ? '#ffffff' : '#ffd1e8';
                }
                
                if (isFirework) {
                    this.speedX = (Math.random() - 0.5) * (Math.random() * 15);
                    this.speedY = (Math.random() - 0.5) * (Math.random() * 15);
                    this.life = 1;
                    this.decay = Math.random() * 0.015 + 0.01;
                    this.type = 'star'; // Kembang api pakai bentuk bintang/bulat saja
                    this.color = ['#ff7eb3', '#ff2a75', '#ffffff', '#ffd1e8'][Math.floor(Math.random() * 4)];
                } else {
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 1 - 0.5; 
                    this.alpha = Math.random() * 0.5 + 0.1;
                    this.alphaChange = (Math.random() * 0.02) - 0.01; 
                }
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.isFirework) {
                    this.speedY += 0.08; 
                    this.life -= this.decay;
                } else {
                    this.alpha += this.alphaChange;
                    if (this.alpha <= 0.1 || this.alpha >= 0.8) {
                        this.alphaChange *= -1;
                    }
                    if (this.y < -20) {
                        this.y = canvas.height + 20;
                        this.x = Math.random() * canvas.width;
                    }
                    if (this.x < -20 || this.x > canvas.width + 20) {
                        this.speedX *= -1;
                    }
                }
            }

            drawHeart(ctx, x, y, size) {
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(size, size);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(0, -3, -5, -3, -5, 0);
                ctx.bezierCurveTo(-5, 3, 0, 5, 0, 7);
                ctx.bezierCurveTo(0, 5, 5, 3, 5, 0);
                ctx.bezierCurveTo(5, -3, 0, -3, 0, 0);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.isFirework ? Math.max(0, this.life) : this.alpha;
                
                if (this.type === 'heart' && !this.isFirework) {
                    this.drawHeart(ctx, this.x, this.y, this.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = this.isFirework ? 15 : 8;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // Class untuk Bintang Jatuh (Shooting Stars)
        class ShootingStar {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width * 1.5;
                this.y = 0;
                this.len = Math.random() * 80 + 20;
                this.speed = Math.random() * 10 + 5;
                this.size = Math.random() * 1.5 + 0.5;
                this.waitTime = Math.random() * 300 + 100;
                this.active = false;
            }

            update() {
                if (this.active) {
                    this.x -= this.speed;
                    this.y += this.speed;
                    if (this.x < -100 || this.y > canvas.height + 100) {
                        this.reset();
                    }
                } else {
                    this.waitTime--;
                    if (this.waitTime <= 0) {
                        this.active = true;
                    }
                }
            }

            draw() {
                if (!this.active) return;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.len, this.y - this.len);
                ctx.lineWidth = this.size;
                
                // Gradient untuk ekor bintang jatuh
                let grad = ctx.createLinearGradient(this.x, this.y, this.x + this.len, this.y - this.len);
                grad.addColorStop(0, "rgba(255, 255, 255, 1)");
                grad.addColorStop(1, "rgba(255, 255, 255, 0)");
                
                ctx.strokeStyle = grad;
                ctx.stroke();
                ctx.restore();
            }
        }

        // Inisialisasi
        for (let i = 0; i < 70; i++) {
            particles.push(new Particle());
        }
        for (let i = 0; i < 2; i++) {
            shootingStars.push(new ShootingStar());
        }

        function triggerFireworks() {
            particles = []; // Hapus background particles
            shootingStars = []; // Matikan bintang jatuh
            for(let i=0; i<4; i++) {
                setTimeout(() => {
                    const originX = canvas.width/2 + (Math.random()-0.5)*150;
                    const originY = canvas.height/2 + (Math.random()-0.5)*150;
                    for (let j = 0; j < 80; j++) {
                        particles.push(new Particle(true, originX, originY));
                    }
                }, i * 350); 
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(8, 2, 10, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Animasikan partikel (bintang + hati)
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                
                if (p.isFirework && p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Animasikan bintang jatuh
            for (let star of shootingStars) {
                star.update();
                star.draw();
            }
            
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
